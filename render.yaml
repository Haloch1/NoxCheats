services:
  - type: web
    name: nox-cheats
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    # All values are set in the Render dashboard (Environment tab), never in the repo.
    envVars:
      - key: SITE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_DESK_CHANNEL_ID
        sync: false
      - key: DISCORD_ORDER_WEBHOOK_URL
        sync: false
      - key: DISCORD_REVIEW_CHANNEL_ID
        sync: false
      - key: DISCORD_BOT_ADMINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: PROMO_CODES
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ADMIN_OPEN
        sync: false
